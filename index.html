<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>邮件可视化编辑器</title>
<style>
  :root{
    --bg:#0e1015; --panel:#161922; --panel2:#1b1f2a; --border:#272d3a;
    --text:#e7e9ee; --muted:#9aa4b6; --accent:#6366f1; --accent2:#ec4899;
    --green:#22c55e; --danger:#ef4444; --radius:10px;
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif;
    background:var(--bg); color:var(--text); overflow:hidden;
  }
  .app{display:flex;flex-direction:column;height:100vh}

  /* Toolbar */
  .toolbar{
    display:flex;align-items:center;gap:10px;padding:10px 14px;
    background:linear-gradient(180deg,#181c26,#13161e);
    border-bottom:1px solid var(--border);flex:0 0 auto;
  }
  .brand{font-weight:700;font-size:15px;letter-spacing:.2px;display:flex;align-items:center;gap:8px;margin-right:6px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 10px var(--accent)}
  .spacer{flex:1}
  .divider{width:1px;height:22px;background:var(--border);margin:0 4px}
  button.btn{
    display:inline-flex;align-items:center;gap:6px;cursor:pointer;
    background:var(--panel2);color:var(--text);border:1px solid var(--border);
    padding:7px 11px;border-radius:8px;font-size:13px;font-weight:500;transition:.15s;white-space:nowrap;
  }
  button.btn:hover{border-color:var(--accent);background:#222838}
  button.btn:disabled{opacity:.4;cursor:not-allowed}
  button.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  button.btn.primary:hover{filter:brightness(1.1)}
  button.btn.good{background:var(--green);border-color:var(--green);color:#06240f}
  button.btn.active{background:#2a3350;border-color:var(--accent);color:#c7cdff}

  /* Main */
  main{display:flex;flex:1;min-height:0}
  .stage{position:relative;flex:1;min-width:0;display:flex;flex-direction:column;background:#0a0c11}
  .stage-bar{
    display:flex;align-items:center;gap:8px;padding:7px 12px;font-size:12px;color:var(--muted);
    background:var(--panel);border-bottom:1px solid var(--border);min-height:36px;overflow-x:auto;white-space:nowrap
  }
  .crumb{color:var(--muted);cursor:pointer;padding:2px 6px;border-radius:6px}
  .crumb:hover{background:#222838;color:var(--text)}
  .crumb.cur{color:#c7cdff;background:#222a44}
  .crumb .sep{color:#4a526380;margin:0 2px}
  .frame-wrap{flex:1;overflow:auto;display:flex;justify-content:center;padding:20px}
  iframe#preview{
    width:100%;max-width:720px;min-height:100%;border:none;background:#fff;border-radius:8px;
    box-shadow:0 12px 40px rgba(0,0,0,.5);
  }
  .drop-hint{
    position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:14px;pointer-events:none;color:var(--muted);text-align:center
  }
  .drop-hint .big{font-size:46px;opacity:.5}
  .drop-hint .t1{font-size:17px;color:var(--text);font-weight:600}
  .drop-hint .t2{font-size:13px}
  .stage.dragover::after{
    content:"松开以载入邮件";position:absolute;inset:14px;border:2px dashed var(--accent);
    border-radius:14px;display:flex;align-items:center;justify-content:center;
    color:#c7cdff;font-size:18px;background:rgba(99,102,241,.08);pointer-events:none
  }

  /* Inspector */
  .inspector{
    flex:0 0 312px;width:312px;background:var(--panel);border-left:1px solid var(--border);
    overflow-y:auto;padding:0
  }
  .insp-empty{padding:40px 22px;color:var(--muted);font-size:13px;line-height:1.9}
  .insp-empty b{color:var(--text)}
  .insp-empty .step{display:flex;gap:10px;margin:14px 0}
  .insp-empty .num{flex:0 0 22px;height:22px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
  .sec{border-bottom:1px solid var(--border);padding:14px 16px}
  .sec h4{margin:0 0 10px;font-size:11px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700}
  .tag-pill{display:inline-block;background:#222a44;color:#c7cdff;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12px;padding:3px 8px;border-radius:6px}
  .field{margin-bottom:11px}
  .field label{display:block;font-size:11.5px;color:var(--muted);margin-bottom:5px}
  .field input[type=text],.field input[type=url],.field input[type=number],.field textarea,.field select{
    width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);
    border-radius:7px;padding:8px 9px;font-size:13px;font-family:inherit
  }
  .field textarea{resize:vertical;min-height:64px;line-height:1.5}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--accent)}
  .row{display:flex;gap:8px}
  .row>*{flex:1}
  .color-row{display:flex;align-items:center;gap:8px}
  .color-row input[type=color]{width:38px;height:34px;padding:0;border:1px solid var(--border);border-radius:7px;background:none;cursor:pointer}
  .color-row input[type=text]{flex:1}
  .seg{display:flex;border:1px solid var(--border);border-radius:7px;overflow:hidden}
  .seg button{flex:1;background:var(--panel2);color:var(--muted);border:none;padding:7px;cursor:pointer;font-size:13px}
  .seg button:hover{background:#222838;color:var(--text)}
  .seg button.on{background:var(--accent);color:#fff}
  .seg button+button{border-left:1px solid var(--border)}
  .op-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .op-grid button{justify-content:center}
  .hint{font-size:11.5px;color:var(--muted);line-height:1.6;margin-top:4px}
  .thumb{max-width:100%;max-height:120px;border-radius:7px;border:1px solid var(--border);margin-bottom:8px;display:block;background:#fff}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:50;padding:24px}
  .modal-bg.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--border);border-radius:14px;width:min(880px,100%);max-height:86vh;display:flex;flex-direction:column;overflow:hidden}
  .modal header{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);font-weight:600}
  .modal header .spacer{flex:1}
  .modal textarea{flex:1;min-height:50vh;border:none;background:#0a0c11;color:#cfe3ff;padding:16px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:12.5px;line-height:1.55;resize:none;outline:none}
  .modal footer{display:flex;gap:10px;justify-content:flex-end;padding:12px 18px;border-top:1px solid var(--border)}
  .modal-body{padding:16px 18px;overflow:auto}
  .batch-modal{width:min(980px,100%)}
  .batch-body{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(260px,.8fr);gap:14px}
  .batch-card{background:#11151f;border:1px solid var(--border);border-radius:8px;padding:12px}
  .batch-card h4{margin:0 0 10px;font-size:12px;color:var(--muted);letter-spacing:.4px;text-transform:uppercase}
  .batch-tools{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .batch-body textarea{width:100%;flex:0 0 auto;min-height:190px;border:1px solid var(--border);border-radius:8px;background:#0a0c11;color:#cfe3ff;padding:12px}
  .batch-vars{display:flex;gap:6px;flex-wrap:wrap;min-height:28px}
  .batch-vars code{background:#222a44;color:#c7cdff;border-radius:6px;padding:4px 7px;font-size:12px}
  .batch-summary{color:var(--muted);font-size:12px;line-height:1.6;margin-top:8px}
  .batch-preview{white-space:pre-wrap;word-break:break-word;max-height:220px;overflow:auto;background:#0a0c11;border:1px solid var(--border);border-radius:8px;padding:10px;color:#cfe3ff;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:11.5px;line-height:1.55}
  .inline-action{display:flex;gap:8px}
  .inline-action input{min-width:0}
  @media(max-width:820px){.batch-body{grid-template-columns:1fr}.toolbar{overflow-x:auto}.inspector{flex-basis:292px;width:292px}}

  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#222a44;color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;box-shadow:0 10px 30px rgba(0,0,0,.5);opacity:0;transition:.25s;pointer-events:none;z-index:60;border:1px solid var(--accent)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .icon{font-size:14px}
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <div class="brand"><span class="dot"></span>邮件可视化编辑器</div>
    <button class="btn primary" id="btnImport"><span class="icon">📂</span>导入邮件</button>
    <button class="btn" id="btnSample"><span class="icon">✨</span>加载示例</button>
    <button class="btn" id="btnPaste"><span class="icon">📋</span>粘贴 HTML</button>
    <button class="btn" id="btnBatch"><span class="icon">▦</span>批量生成</button>
    <div class="divider"></div>
    <button class="btn" id="btnUndo" title="撤销 (Ctrl+Z)" disabled><span class="icon">↶</span></button>
    <button class="btn" id="btnRedo" title="重做 (Ctrl+Y)" disabled><span class="icon">↷</span></button>
    <button class="btn active" id="btnEdit" title="开关编辑模式"><span class="icon">🖱️</span>编辑模式</button>
    <div class="spacer"></div>
    <button class="btn" id="btnCode"><span class="icon">{ }</span>源码</button>
    <button class="btn" id="btnCopy"><span class="icon">⧉</span>复制 HTML</button>
    <button class="btn good" id="btnDownload"><span class="icon">⬇</span>下载</button>
  </div>

  <main>
    <div class="stage" id="stage">
      <div class="stage-bar" id="bar"><span style="opacity:.7">未加载邮件 · 导入或加载示例开始</span></div>
      <div class="frame-wrap"><iframe id="preview" title="邮件预览" sandbox="allow-same-origin allow-popups allow-popups-to-escape-sandbox" referrerpolicy="no-referrer"></iframe></div>
      <div class="drop-hint" id="dropHint">
        <div class="big">📧</div>
        <div class="t1">把下载的邮件拖到这里</div>
        <div class="t2">支持 .eml / .html / .htm　·　或点上方「导入邮件 / 加载示例 / 粘贴 HTML」</div>
      </div>
    </div>
    <aside class="inspector" id="inspector">
      <div class="insp-empty" id="inspEmpty">
        <b>怎么用：</b>
        <div class="step"><div class="num">1</div><div>导入一封下载好的邮件（或点「加载示例」试试）。</div></div>
        <div class="step"><div class="num">2</div><div>鼠标移到任意元素上，它会<b style="color:#c7cdff">发光高亮</b>。</div></div>
        <div class="step"><div class="num">3</div><div><b>点击</b>选中元素 → 直接在邮件里改文字；右侧面板改链接 / 图片 / 颜色 / 删除。</div></div>
        <div class="step"><div class="num">4</div><div>完成后「下载」导出新的 HTML 邮件。</div></div>
      </div>
    </aside>
  </main>
</div>

<input type="file" id="fileInput" accept=".eml,.html,.htm,message/rfc822,text/html" hidden>
<input type="file" id="batchFileInput" accept=".csv,.tsv,.json,text/csv,text/tab-separated-values,application/json" hidden>

<div class="modal-bg" id="codeModal">
  <div class="modal">
    <header><span id="codeTitle">邮件源码（可直接编辑）</span><span class="spacer"></span><button class="btn" id="codeClose">关闭</button></header>
    <textarea id="codeArea" spellcheck="false"></textarea>
    <footer>
      <button class="btn" id="codeCopy">复制</button>
      <button class="btn primary" id="codeApply">应用修改并重新渲染</button>
    </footer>
  </div>
</div>

<div class="modal-bg" id="batchModal">
  <div class="modal batch-modal">
    <header><span>批量生成 HTML</span><span class="spacer"></span><button class="btn" id="batchClose">关闭</button></header>
    <div class="modal-body batch-body">
      <div class="batch-card">
        <h4>数据</h4>
        <div class="batch-tools">
          <button class="btn" id="batchLoadFile">导入 CSV/TSV/JSON</button>
          <button class="btn" id="batchExample">示例数据</button>
        </div>
        <div class="field">
          <label>每行一封邮件，首行为字段名</label>
          <textarea id="batchData" spellcheck="false" placeholder="name,email,discount,link&#10;张三,zhang@example.com,8折,https://example.com/a"></textarea>
        </div>
        <div class="field">
          <label>文件名模板</label>
          <input type="text" id="batchName" value="email-{{index}}-{{name}}.html">
        </div>
      </div>
      <div class="batch-card">
        <h4>模板变量</h4>
        <div class="batch-vars" id="batchVars"></div>
        <div class="batch-summary" id="batchSummary">请先载入一封邮件模板。</div>
        <h4 style="margin-top:16px">首条预览</h4>
        <div class="batch-preview" id="batchPreview">暂无预览</div>
      </div>
    </div>
    <footer>
      <button class="btn" id="batchPreviewBtn">刷新预览</button>
      <button class="btn good" id="batchDownload">下载全部</button>
    </footer>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";
  const $ = s => document.querySelector(s);
  const frame = $('#preview');
  const inspector = $('#inspector');
  const bar = $('#bar');
  const emptyInspectorHTML = $('#inspEmpty').outerHTML;
  let doc = null;          // iframe document
  let editMode = true;
  let selected = null;
  let editingBefore = null;

  /* ---------- toast ---------- */
  let toastT;
  function toast(msg){
    const el = $('#toast'); el.textContent = msg; el.classList.add('show');
    clearTimeout(toastT); toastT = setTimeout(()=>el.classList.remove('show'), 1900);
  }
  function renderEmptyInspector(){
    inspector.innerHTML = emptyInspectorHTML;
  }

  /* ---------- history ---------- */
  let history = [], hpos = -1;
  function cleanFragment(html){
    if(!doc) return html;
    const tmp = doc.createElement('div'); tmp.innerHTML = html;
    tmp.querySelectorAll('[contenteditable]').forEach(n=>n.removeAttribute('contenteditable'));
    tmp.querySelectorAll('.__ee-hover,.__ee-selected').forEach(n=>{
      n.classList.remove('__ee-hover','__ee-selected');
      if(!n.getAttribute('class')) n.removeAttribute('class');
    });
    return tmp.innerHTML;
  }
  function snapshot(){
    if(!doc) return;
    const html = cleanFragment(doc.body.innerHTML);
    if(history[hpos] === html) return;
    history = history.slice(0, hpos+1);
    history.push(html); hpos = history.length-1;
    if(history.length > 80){ history.shift(); hpos--; }
    updateHistoryButtons();
  }
  function restore(html){
    deselect();
    doc.body.innerHTML = html;
    updateHistoryButtons();
  }
  function undo(){ if(hpos>0){ hpos--; restore(history[hpos]); toast('已撤销'); } }
  function redo(){ if(hpos<history.length-1){ hpos++; restore(history[hpos]); toast('已重做'); } }
  function updateHistoryButtons(){
    $('#btnUndo').disabled = !(hpos>0);
    $('#btnRedo').disabled = !(hpos<history.length-1);
  }

  /* ---------- load into iframe ---------- */
  function loadHTML(html){
    $('#dropHint').style.display = 'none';
    frame.onload = ()=>{
      doc = frame.contentDocument || frame.contentWindow.document;
      injectLayer();
      history = []; hpos = -1; snapshot();
      deselect();
      updateBatchPreview();
      toast('邮件已载入，移动鼠标试试发光效果');
    };
    frame.srcdoc = html;
  }

  function injectLayer(){
    if(!doc) return;
    let style = doc.getElementById('__ee_style');
    if(!style){ style = doc.createElement('style'); style.id='__ee_style'; doc.head.appendChild(style); }
    style.textContent = `
      .__ee-hover{ outline:2px solid #6366f1 !important; outline-offset:1px !important;
        box-shadow:0 0 0 3px rgba(99,102,241,.25), 0 0 16px 2px rgba(99,102,241,.55) !important;
        cursor:pointer !important; border-radius:2px; }
      .__ee-selected{ outline:2px solid #ec4899 !important; outline-offset:1px !important;
        box-shadow:0 0 0 3px rgba(236,72,153,.30), 0 0 18px 3px rgba(236,72,153,.6) !important; }
      [contenteditable=true]{ caret-color:#ec4899; cursor:text !important;
        -webkit-user-select:text !important; user-select:text !important; }
      [contenteditable=true]:focus{ outline:2px dashed #ec4899 !important; }
      [data-ee-bind]{ box-shadow:inset 0 0 0 1px rgba(34,197,94,.45) !important; }
    `;
    const b = doc.body;
    b.addEventListener('mouseover', onHover, true);
    b.addEventListener('mouseout', onOut, true);
    b.addEventListener('mousedown', onMouseDown, true);
    b.addEventListener('click', onClick, true);
    b.addEventListener('focusin', onFocusIn, true);
    b.addEventListener('focusout', onFocusOut, true);
    b.addEventListener('input', onFrameInput, true);
    doc.addEventListener('keydown', onFrameKey, true);
  }

  function isArtifact(el){ return !el || el.id==='__ee_style' || el===doc.documentElement; }
  function isMedia(el){ return /^(IMG|HR|BR|INPUT|VIDEO|IFRAME|svg|IMAGE)$/i.test(el.tagName); }

  /* ---------- hover ---------- */
  function onHover(e){
    if(!editMode) return;
    const el = e.target;
    if(isArtifact(el) || el===doc.body) return;
    el.classList.add('__ee-hover');
  }
  function onOut(e){
    const el = e.target;
    if(el && el.classList) el.classList.remove('__ee-hover');
  }

  /* ---------- click / select ---------- */
  // Make the element editable on mousedown (BEFORE the browser places the caret),
  // so the very first click drops a caret and you can type immediately.
  function onMouseDown(e){
    if(!editMode) return;
    const el = e.target;
    if(isArtifact(el) || el===doc.body) return;
    if(!isMedia(el) && el.getAttribute('contenteditable')!=='true'){
      el.setAttribute('contenteditable','true');
    }
  }

  function onClick(e){
    if(!editMode) return;
    const el = e.target;
    if(isArtifact(el)) return;
    const inLink = el.closest && el.closest('a');
    // clicking inside the element currently being edited -> let caret move freely
    if(selected && selected.isContentEditable && (el===selected || selected.contains(el))){
      if(inLink) e.preventDefault(); // block link navigation while editing
      return;
    }
    if(inLink) e.preventDefault();   // don't follow links when selecting
    e.stopPropagation();
    select(el);
    ensureCaret(e.clientX, e.clientY);
  }

  // Place a visible caret where the user clicked (or keep their drag-selection).
  function ensureCaret(x,y){
    if(!selected || !selected.isContentEditable) return;
    try{
      const sel = frame.contentWindow.getSelection();
      if(sel && sel.rangeCount && !sel.isCollapsed){
        const a = sel.anchorNode;
        if(a && (a===selected || selected.contains(a))){ selected.focus({preventScroll:true}); return; }
      }
      let range = null;
      if(typeof doc.caretRangeFromPoint==='function') range = doc.caretRangeFromPoint(x,y);
      else if(typeof doc.caretPositionFromPoint==='function'){
        const p = doc.caretPositionFromPoint(x,y);
        if(p){ range = doc.createRange(); range.setStart(p.offsetNode, p.offset); range.collapse(true); }
      }
      if(range && !(selected===range.startContainer || selected.contains(range.startContainer))) range = null;
      if(!range){ range = doc.createRange(); range.selectNodeContents(selected); range.collapse(false); }
      selected.focus({preventScroll:true});
      sel.removeAllRanges(); sel.addRange(range);
    }catch(_){ try{ selected.focus({preventScroll:true}); }catch(__){} }
  }

  function select(el){
    if(!el || el===doc.body || el===doc.documentElement) return;
    deselect();
    selected = el;
    el.classList.remove('__ee-hover');
    el.classList.add('__ee-selected');
    if(!isMedia(el)){ el.setAttribute('contenteditable','true'); try{ el.focus({preventScroll:true}); }catch(_){} }
    renderInspector(el);
    renderBreadcrumb(el);
  }
  function deselect(){
    if(selected){
      selected.classList.remove('__ee-selected','__ee-hover');
      selected.removeAttribute('contenteditable');
      if(!selected.getAttribute('class')) selected.removeAttribute('class');
    }
    selected = null;
    renderEmptyInspector();
    if(doc) renderBreadcrumb(null);
  }

  /* ---------- inline text edit history ---------- */
  function onFocusIn(e){ if(e.target && e.target.isContentEditable) editingBefore = e.target.innerHTML; }
  function onFocusOut(e){
    if(e.target && e.target.isContentEditable && editingBefore!==null && e.target.innerHTML!==editingBefore){
      snapshot();
    }
    editingBefore = null;
  }
  function onFrameInput(e){
    if(!editMode || syncingBind) return;
    const el = e.target;
    if(el && el.isContentEditable && el.getAttribute('data-ee-bind')){
      syncBoundText(el);
      if(el===selected){ const text = $('#f-text'); if(text) text.value = el.textContent; }
    }
  }

  function onFrameKey(e){
    const ae = doc.activeElement;
    const typing = ae && ae.isContentEditable;
    if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='z'){ e.preventDefault(); e.shiftKey?redo():undo(); return; }
    if((e.ctrlKey||e.metaKey) && e.key.toLowerCase()==='y'){ e.preventDefault(); redo(); return; }
    if(e.key==='Escape'){ deselect(); return; }
    if((e.key==='Delete') && selected && !typing){ e.preventDefault(); deleteEl(); }
  }

  /* ---------- breadcrumb ---------- */
  function renderBreadcrumb(el){
    if(!el){ bar.innerHTML = '<span style="opacity:.7">已载入 · 鼠标悬停元素发光，点击选中编辑</span>'; return; }
    const chain = [];
    let n = el;
    while(n && n!==doc.documentElement){ chain.unshift(n); if(n===doc.body) break; n = n.parentElement; }

  function rgbToHex(rgb){

  /* ---------- export ---------- */

  /* ---------- batch generation ---------- */
  const TOKEN_RE = /\{\{\{\s*([^{}]+?)\s*\}\}\}|\{\{\s*([^{}]+?)\s*\}\}/g;
  function htmlEscapeValue(v){
    return String(v==null?'':v).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function isSpecialVariable(key){ return /^(index|index0)$/i.test((key||'').trim()); }
  function templateValue(row,key,index){
    key = (key||'').trim();
    if(/^index$/i.test(key)) return String(index+1);
    if(/^index0$/i.test(key)) return String(index);
    return row && Object.prototype.hasOwnProperty.call(row,key) ? row[key] : '';
  }
  function replaceTemplateTokens(template,row,index,escapeHTML){
    return String(template||'').replace(TOKEN_RE,(_,rawKey,escapedKey)=>{
      const value = templateValue(row, rawKey || escapedKey, index);
      return rawKey || !escapeHTML ? String(value==null?'':value) : htmlEscapeValue(value);
    });
  }
  function applyBatchTemplate(template,row,index){ return replaceTemplateTokens(template,row,index,true); }
  function applyPlainTemplate(template,row,index){ return replaceTemplateTokens(template,row,index,false); }
  function collectPlaceholders(template){
    const names = new Set();
    String(template||'').replace(TOKEN_RE,(_,rawKey,escapedKey)=>{ const key=(rawKey||escapedKey||'').trim(); if(key) names.add(key); return _; });
    return Array.from(names);
  }
  function stringifyCell(v){
    if(v==null) return '';
    if(typeof v==='object') return JSON.stringify(v);
    return String(v);
  }
  function normalizeRow(row){
    const out = {};
    Object.keys(row||{}).forEach(k=>{ out[String(k).trim()] = stringifyCell(row[k]); });
    return out;
  }
  function detectDelimiter(text){
    const line = String(text||'').replace(/^\uFEFF/,'').split(/\r?\n/).find(x=>x.trim()) || '';
    const counts = [{d:'\t',n:(line.match(/\t/g)||[]).length},{d:',',n:(line.match(/,/g)||[]).length},{d:';',n:(line.match(/;/g)||[]).length}];
    counts.sort((a,b)=>b.n-a.n);
    return counts[0].n ? counts[0].d : ',';
  }
  function parseDelimited(text,delimiter){
    const rows = []; let row = [], cell = '', quoted = false;
    text = String(text||'').replace(/^\uFEFF/,'');
    for(let i=0;i<text.length;i++){
      const ch = text[i];
      if(quoted){
        if(ch==='"'){ if(text[i+1]==='"'){ cell+='"'; i++; } else quoted=false; }
        else cell += ch;
      }else if(ch==='"') quoted = true;
      else if(ch===delimiter){ row.push(cell); cell=''; }
      else if(ch==='\n'){ row.push(cell); rows.push(row); row=[]; cell=''; }
      else if(ch!=='\r') cell += ch;
    }
    if(cell!=='' || row.length){ row.push(cell); rows.push(row); }
    const header = (rows.shift()||[]).map(x=>String(x||'').trim());
    return rows.filter(r=>r.some(c=>String(c).trim()!=='')).map(r=>{
      const obj = {};
      header.forEach((h,i)=>{ if(h) obj[h] = stringifyCell(r[i]); });
      return obj;
    });
  }
  function parseBatchInput(raw){
    raw = String(raw||'').trim();
    if(!raw) return [];
    if(raw[0]==='[' || raw[0]==='{'){
      const parsed = JSON.parse(raw);
      const rows = Array.isArray(parsed) ? parsed : (Array.isArray(parsed.rows) ? parsed.rows : (Array.isArray(parsed.data) ? parsed.data : [parsed]));
      return rows.map(normalizeRow);
    }
    return parseDelimited(raw, detectDelimiter(raw));
  }
  function csvCell(v){
    v = String(v==null?'':v);
    return /[",\n\r]/.test(v) ? '"'+v.replace(/"/g,'""')+'"' : v;
  }
  function safeFileName(name,fallback){
    name = String(name||fallback||'email.html').replace(/[<>:"/\\|?*\x00-\x1F]/g,'-').replace(/\s+/g,' ').trim();
    if(!name) name = fallback || 'email.html';
    if(!/\.html?$/i.test(name)) name += '.html';
    if(name.length<=150) return name;
    const ext = (name.match(/\.html?$/i)||['.html'])[0];
    return name.slice(0,150-ext.length).trim()+ext;
  }
  function uniqueFileName(name,used){
    const m = name.match(/^(.*?)(\.[^.]+)$/);
    const base = m ? m[1] : name, ext = m ? m[2] : '';
    let n = name, i = 2;
    while(used.has(n.toLowerCase())) n = base+'-'+(i++)+ext;
    used.add(n.toLowerCase());
    return n;
  }
  function buildBatchExample(){
    const vars = doc ? collectPlaceholders(getCleanHTML()).filter(v=>!isSpecialVariable(v)) : [];
    const headers = vars.length ? vars : ['name','email','discount','link'];
    const valueFor = (key,i)=>{
      const k = key.toLowerCase();
      if(k.includes('email')) return i ? 'li@example.com' : 'zhang@example.com';
      if(k.includes('url') || k.includes('link') || k.includes('href')) return i ? 'https://example.com/b' : 'https://example.com/a';
      if(k.includes('discount') || k.includes('coupon')) return i ? '满100减20' : '8折';
      if(k.includes('name')) return i ? '李四' : '张三';
      return i ? '示例值B' : '示例值A';
    };
    const lines = [headers.map(csvCell).join(',')];
    lines.push(headers.map(h=>csvCell(valueFor(h,0))).join(','));
    lines.push(headers.map(h=>csvCell(valueFor(h,1))).join(','));
    return lines.join('\n');
  }
  function updateBatchPreview(){
    const varsBox = $('#batchVars'), summary = $('#batchSummary'), preview = $('#batchPreview');
    const download = $('#batchDownload'), previewBtn = $('#batchPreviewBtn');
    if(!varsBox || !summary || !preview) return;
    const template = doc ? getCleanHTML() : '';
    const vars = collectPlaceholders(template);
    varsBox.innerHTML = vars.length ? vars.map(v=>'<code>{{'+esc(v)+'}}</code>').join('') : '<span class="hint">当前模板暂无变量</span>';
    let rows = [], error = '';
    try{ rows = parseBatchInput(($('#batchData')||{}).value || ''); }catch(err){ error = err.message || String(err); }
    if(download) download.disabled = !doc || !!error || !rows.length;
    if(previewBtn) previewBtn.disabled = !doc;
    if(!doc){ summary.textContent = '请先载入一封邮件模板。'; preview.textContent = '暂无预览'; return; }
    if(error){ summary.textContent = '数据解析失败：'+error; preview.textContent = ''; return; }
    const first = rows[0] || {};
    const missing = vars.filter(v=>!isSpecialVariable(v) && !Object.prototype.hasOwnProperty.call(first,v));
    summary.textContent = rows.length ? ('已识别 '+rows.length+' 行，模板变量 '+vars.length+' 个'+(missing.length?'，首行缺少：'+missing.join('、'):'')) : ('模板变量 '+vars.length+' 个，等待数据。');
    preview.textContent = rows.length ? applyBatchTemplate(template, first, 0).slice(0, 3000) : '暂无预览';
  }
  function openBatch(){

  function downloadBatch(){

    if(!rows.length){ toast('请先填写批量数据'); return; }
    if(rows.length>50 && !confirm('将下载 '+rows.length+' 个 HTML 文件，继续吗？')) return;
    const template = getCleanHTML();
    const nameTpl = $('#batchName').value || 'email-{{index}}.html';
    const used = new Set();
    rows.forEach((row,i)=>{

  }

  /* ================= EML / MIME 解析 ================= */
  function b64ToBytes(b64){
    try{ const bin=atob((b64||'').replace(/[^A-Za-z0-9+/=]/g,'')); const a=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++)a[i]=bin.charCodeAt(i); return a; }catch(_){ return new Uint8Array(0); }
  }
  function bytesToB64(bytes){ let s=''; for(let i=0;i<bytes.length;i++)s+=String.fromCharCode(bytes[i]); return btoa(s); }
  function decodeText(bytes,charset){ try{ return new TextDecoder(charset||'utf-8').decode(bytes); }catch(_){ return new TextDecoder('utf-8').decode(bytes); } }
  function decodeQP(str){
    str = str.replace(/=\r?\n/g,'');
    const out=[];
    for(let i=0;i<str.length;i++){
      if(str[i]==='='){ const h=str.substr(i+1,2); if(/^[0-9A-Fa-f]{2}$/.test(h)){ out.push(parseInt(h,16)); i+=2; continue; } }
      out.push(str.charCodeAt(i)&0xff);

    return new Uint8Array(out);
  }
  function parseHeaders(raw){
    const lines = raw.split('\n'); const h={}; let cur=null;
    for(const line of lines){
      if(/^[ \t]/.test(line) && cur){ h[cur]+=' '+line.trim(); }
      else { const m=line.match(/^([!-9;-~]+):\s?(.*)$/); if(m){ cur=m[1].toLowerCase(); h[cur]=m[2]||''; } }
    }
    return h;
  }
  function contentType(h){
    const ct=h['content-type']||'text/plain'; const type=ct.split(';')[0].trim().toLowerCase();
    const params={}; const re=/;\s*([\w-]+)\s*=\s*("([^"]*)"|[^;]+)/g; let m;
    while((m=re.exec(ct))){ params[m[1].toLowerCase()] = (m[3]!==undefined?m[3]:m[2]).trim(); }
    return {type,params};
  }
  function splitEntity(block){
    const m = block.match(/\n[ \t]*\n/);
    if(!m) return {headers:parseHeaders(block), body:''};
    return {headers:parseHeaders(block.slice(0,m.index)), body:block.slice(m.index+m[0].length)};
  }
  function splitByBoundary(body,boundary){
    const parts=[]; const delim='--'+boundary;
    const segs=body.split(delim);
    for(let i=1;i<segs.length;i++){ let s=segs[i]; if(s.startsWith('--')) break; parts.push(s.replace(/^\r?\n/,'')); }
    return parts;
  }
  function walk(headers,body,col){
    const {type,params}=contentType(headers);
    if(type.indexOf('multipart/')===0){
      const b=params.boundary; if(!b) return;
      splitByBoundary(body,b).forEach(seg=>{ const e=splitEntity(seg); walk(e.headers,e.body,col); });
      return;
    }
    const enc=(headers['content-transfer-encoding']||'').toLowerCase().trim();
    const charset=(params.charset||'utf-8').toLowerCase();
    const decode = ()=> enc==='base64'?decodeText(b64ToBytes(body),charset) : enc==='quoted-printable'?decodeText(decodeQP(body),charset) : body;
    if(type==='text/html'){ col.html = decode(); }
    else if(type==='text/plain'){ if(col.text===null) col.text = decode(); }
    else if(type.indexOf('image/')===0){
      const bytes = enc==='base64'?b64ToBytes(body):new TextEncoder().encode(body);
      const uri='data:'+type+';base64,'+bytesToB64(bytes);
      let cid=(headers['content-id']||'').trim().replace(/^<|>$/g,''); if(cid){ col.images[cid]=uri; }
      const cd=headers['content-disposition']||''; const nm=(params.name)|| (cd.match(/filename="?([^";]+)"?/i)||[])[1];
      if(nm) col.images[nm.trim()]=uri;
    }
  }
  function parseEml(raw){
    raw = raw.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    const e = splitEntity(raw);
    const col={html:null,text:null,images:{}};
    walk(e.headers,e.body,col);
    let html=col.html;
    if(!html && col.text!==null) html='<div style="white-space:pre-wrap;font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#222;padding:20px">'+esc(col.text)+'</div>';
    if(!html) throw new Error('未找到 HTML/文本正文');
    html = html.replace(/(["'(]\s*)cid:([^"')\s>]+)/gi,(m,pre,cid)=>{ const k=cid.trim(); return col.images[k]?pre+col.images[k]:m; });
    if(!/<html[\s>]/i.test(html)) html='<!DOCTYPE html><html><head><meta charset="utf-8"></head><body>'+html+'</body></html>';
    return html;
  }
  function looksLikeEml(txt){
    const head = txt.slice(0,4000);
    return /\n?(content-type|mime-version|from|to|subject)\s*:/i.test(head) && /content-type\s*:/i.test(head);
  }

        }

        catch(e2){ toast('载入失败：'+err.message); }

    };

  }
